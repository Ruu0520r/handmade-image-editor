<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハンドメイド商品画像 一括編集ツール</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #faf9f7;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e8e0d8;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #5a3e28;
    }
    header .badge {
      background: #f0e6d8;
      color: #8b5e3c;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .steps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 700px) {
      .steps { grid-template-columns: 1fr; }
    }
    .step-card {
      background: #fff;
      border: 1.5px solid #e8e0d8;
      border-radius: 14px;
      padding: 24px;
    }
    .step-card.active-step {
      border-color: #c9956b;
      box-shadow: 0 0 0 3px rgba(201,149,107,0.12);
    }
    .step-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .step-num {
      width: 28px; height: 28px;
      background: #5a3e28;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0;
    }
    .step-title {
      font-size: 15px;
      font-weight: 700;
      color: #3d2b1a;
    }
    .step-desc {
      font-size: 12px;
      color: #9a8070;
      margin-top: 2px;
    }
    .drop-zone {
      border: 2px dashed #d4c4b4;
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fdf9f6;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #c9956b;
      background: #fdf4ec;
    }
    .drop-zone .icon { font-size: 30px; margin-bottom: 8px; }
    .drop-zone p { font-size: 13px; color: #8b7060; }
    .drop-zone p span { color: #c9956b; font-weight: 600; }
    input[type="file"] { display: none; }

    /* Sample preview */
    .sample-preview {
      margin-top: 14px;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #f5ede4;
      border-radius: 8px;
    }
    .sample-preview img {
      width: 56px; height: 56px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e0d0c0;
    }
    .sample-preview .info { font-size: 12px; }
    .sample-preview .info strong { color: #5a3e28; display: block; margin-bottom: 2px; }
    .sample-preview .info span { color: #9a8070; }


    /* Process button */
    .btn-process {
      width: 100%;
      padding: 16px;
      background: #5a3e28;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-process:hover:not(:disabled) { background: #7a5a3a; }
    .btn-process:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress */
    .progress-bar-wrap {
      display: none;
      margin-bottom: 20px;
    }
    .progress-bar-bg {
      background: #e8e0d8;
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9956b, #e8a87c);
      border-radius: 10px;
      transition: width 0.2s;
      width: 0%;
    }
    .progress-text {
      font-size: 12px;
      color: #9a8070;
      margin-top: 6px;
      text-align: center;
    }

    /* Results */
    .results-section { display: none; }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #3d2b1a;
    }
    .btn-download {
      background: #c9956b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-download:hover { background: #b8845a; }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .result-item {
      background: #fff;
      border: 1.5px solid #e8e0d8;
      border-radius: 10px;
      overflow: hidden;
    }
    .result-item canvas {
      width: 100%;
      display: block;
    }
    .result-item .result-name {
      padding: 6px 10px;
      font-size: 11px;
      color: #9a8070;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Thumbnail strip */
    .thumb-strip {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .thumb-item {
      width: 56px; height: 56px;
      border-radius: 6px;
      object-fit: cover;
      border: 1.5px solid #e0d0c0;
    }
    .thumb-more {
      width: 56px; height: 56px;
      border-radius: 6px;
      background: #f0e6d8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #8b5e3c;
      font-weight: 600;
    }

    .count-badge {
      background: #5a3e28;
      color: white;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .file-count-label {
      font-size: 13px;
      color: #8b7060;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🧶 ハンドメイド画像 一括編集</h1>
    <span class="badge">BASE対応</span>
  </header>

  <div class="container">
    <!-- STEP 1 & 2 -->
    <div class="steps">
      <!-- Step 1: Sample -->
      <div class="step-card" id="card1">
        <div class="step-label">
          <div class="step-num">1</div>
          <div>
            <div class="step-title">サンプル画像をアップロード</div>
            <div class="step-desc">このトーンに合わせて全画像を補正します</div>
          </div>
        </div>
        <div class="drop-zone" id="sampleDrop" onclick="document.getElementById('sampleInput').click()">
          <div class="icon">🖼️</div>
          <p>クリックまたはドラッグ＆ドロップ</p>
          <p style="margin-top:4px; font-size:11px; color:#bbb;">1枚の基準画像</p>
        </div>
        <input type="file" id="sampleInput" accept="image/*">
        <div class="sample-preview" id="samplePreview">
          <img id="sampleThumb" src="" alt="sample">
          <div class="info">
            <strong id="sampleName"></strong>
            <span id="sampleStats"></span>
          </div>
        </div>
      </div>

      <!-- Step 2: Products -->
      <div class="step-card" id="card2">
        <div class="step-label">
          <div class="step-num">2</div>
          <div>
            <div class="step-title">商品画像をまとめてアップロード</div>
            <div class="step-desc">10〜50枚まとめて選択OK</div>
          </div>
        </div>
        <div class="drop-zone" id="productDrop" onclick="document.getElementById('productInput').click()">
          <div class="icon">📦</div>
          <p><span>クリックして複数選択</span>またはドラッグ＆ドロップ</p>
          <p style="margin-top:4px; font-size:11px; color:#bbb;">JPG・PNG・WEBP 対応</p>
        </div>
        <input type="file" id="productInput" accept="image/*" multiple>
        <div id="productCount" class="file-count-label" style="display:none;"></div>
        <div class="thumb-strip" id="thumbStrip"></div>
      </div>
    </div>

    <!-- Process Button -->
    <button class="btn-process" id="processBtn" disabled onclick="processImages()">
      ✨ 一括編集を開始する
    </button>

    <!-- Progress -->
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">処理中...</div>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection">
      <div class="results-header">
        <h2>✅ 編集完了 <span class="count-badge" id="resultCount"></span></h2>
        <button class="btn-download" onclick="downloadAll()">📥 全てZIPでダウンロード</button>
      </div>
      <div class="results-grid" id="resultsGrid"></div>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────
    let sampleImageData = null;
    let sampleStats = null;
    let productFiles = [];
    let processedCanvases = [];

    // ─── Fixed settings ───────────────────────────────────────────
    const BRIGHTNESS_STR = 0.80;
    const OUTPUT_SIZE    = 1900;
    const PADDING_PCT    = 0;
    const USE_TRANSPARENT = true;

    // ─── Sample upload ────────────────────────────────────────────
    document.getElementById('sampleInput').addEventListener('change', (e) => {
      if (e.target.files[0]) loadSampleImage(e.target.files[0]);
    });
    setupDrop('sampleDrop', 'sampleInput', (files) => {
      if (files[0]) loadSampleImage(files[0]);
    });

    function loadSampleImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          // draw to canvas and analyze
          const canvas = document.createElement('canvas');
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          sampleStats = analyzeImage(imageData);
          sampleImageData = imageData;

          // UI
          document.getElementById('sampleThumb').src = e.target.result;
          document.getElementById('sampleName').textContent = file.name;
          document.getElementById('sampleStats').textContent =
            `平均輝度: ${sampleStats.avgBrightness.toFixed(0)} | コントラスト: ${sampleStats.contrast.toFixed(0)}`;
          document.getElementById('samplePreview').style.display = 'flex';
     document.getElementById('card1').classList.add('active-step');
          checkReady();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ─── Product upload ───────────────────────────────────────────
    document.getElementById('productInput').addEventListener('change', (e) => {
      if (e.target.files.length) loadProductFiles(e.target.files);
    });
    setupDrop('productDrop', 'productInput', (files) => {
      if (files.length) loadProductFiles(files);
    });

    function loadProductFiles(files) {
      productFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (!productFiles.length) return;

      document.getElementById('productCount').style.display = 'block';
      document.getElementById('productCount').textContent = `${productFiles.length} 枚の画像が選択されています`;
      document.getElementById('card2').classList.add('active-step');

      // Thumbnail strip
      const strip = document.getElementById('thumbStrip');
      strip.innerHTML = '';
      strip.style.display = 'flex';
      const shown = Math.min(productFiles.length, 8);
      for (let i = 0; i < shown; i++) {
        const img = document.createElement('img');
        img.className = 'thumb-item';
        const reader = new FileReader();
        reader.onload = (e) => { img.src = e.target.result; };
        reader.readAsDataURL(productFiles[i]);
        strip.appendChild(img);
      }
      if (productFiles.length > 8) {
        const more = document.createElement('div');
        more.className = 'thumb-more';
        more.textContent = `+${productFiles.length - 8}`;
        strip.appendChild(more);
      }
      checkReady();
    }

    function checkReady() {
      const ready = sampleStats && productFiles.length > 0;
      document.getElementById('processBtn').disabled = !ready;
    }

    // ─── Image analysis ───────────────────────────────────────────
    // 商品部分の輝度のみを計算する（背景・ハイライトを除外）
    // アクリルボード等の半透明背景も除外するため、輝度ベースの閾値を使用
    function analyzeImage(imageData) {
      const data = imageData.data;
      let sumBrightness = 0;
      let values = [];
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        // 透明ピクセルをスキップ
        if (a < 128) continue;
        const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
        // 明るすぎる背景（白・アクリルボード・ハイライト）をスキップ
        // 暗すぎる影ピクセルもスキップ（商品の中間輝度域のみ対象）
        if (brightness > 220 || brightness < 15) continue;
        sumBrightness += brightness;
        values.push(brightness);
      }
      // 対象ピクセルが少ない場合（白背景のみ等）のフォールバック
      if (values.length < 100) {
        return { avgBrightness: 128, contrast: 0 };
      }
      const n = values.length;
      const avgBrightness = sumBrightness / n;
      const variance = values.reduce((acc, v) => acc + (v - avgBrightness) ** 2, 0) / n;
      const contrast = Math.sqrt(variance);
      return { avgBrightness, contrast };
    }

    // ─── Build LUT (Look-Up Table) for fast gamma correction ──────
    function buildGammaLUT(gamma) {
      const lut = new Uint8ClampedArray(256);
      for (let i = 0; i < 256; i++) {
        lut[i] = Math.round(255 * Math.pow(i / 255, gamma));
      }
      return lut;
    }

    // ─── Process images ───────────────────────────────────────────
    async function processImages() {
      if (!sampleStats || productFiles.length === 0) return;

      const outputSize    = OUTPUT_SIZE;
      const paddingPct    = PADDING_PCT;
      const brightnessStr = BRIGHTNESS_STR;
      const useTransparent = USE_TRANSPARENT;

      processedCanvases = [];
      document.getElementById('progressWrap').style.display = 'block';
      document.getElementById('resultsSection').style.display = 'none';
      document.getElementById('resultsGrid').innerHTML = '';
      document.getElementById('processBtn').disabled = true;

      for (let i = 0; i < productFiles.length; i++) {
        const file = productFiles[i];
        const canvas = await processOneImage(file, outputSize, paddingPct, brightnessStr, useTransparent);
        processedCanvases.push({ canvas, name: file.name });

        // progress
        const pct = Math.round(((i + 1) / productFiles.length) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent =
          `${i + 1} / ${productFiles.length} 枚処理中...`;

        // yield
        await new Promise(r => setTimeout(r, 0));
      }

      document.getElementById('progressText').textContent = '完了！';
      showResults();
      document.getElementById('processBtn').disabled = false;
    }

    function processOneImage(file, outputSize, paddingPct, brightnessStr, useTransparent) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            // Analyze source
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = img.width; tmpCanvas.height = img.height;
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(img, 0, 0);
            const srcData = tmpCtx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
            const srcStats = analyzeImage(srcData);

            // ── Gamma-based brightness correction ─────────────────
            // gamma < 1 → brightens (lifts shadows gently, protects highlights)
            // gamma > 1 → darkens
            // This avoids "white haze" that additive correction causes
            let gamma = 1.0;
            const srcB = srcStats.avgBrightness;
            const tgtB = sampleStats.avgBrightness;
            if (srcB > 5 && tgtB > 5 && srcB < 250 && tgtB < 250) {
              const rawGamma = Math.log(tgtB / 255) / Math.log(srcB / 255);
              // Blend toward identity (1.0) based on user strength
              gamma = 1.0 + (rawGamma - 1.0) * brightnessStr;
              // Clamp to safe range to prevent extreme corrections
              gamma = Math.max(0.35, Math.min(2.8, gamma));
            }
            const lut = buildGammaLUT(gamma);

            // Output canvas (square)
            const out = document.createElement('canvas');
            out.width = outputSize; out.height = outputSize;
            const ctx = out.getContext('2d');

            if (!useTransparent) {
              ctx.fillStyle = 'white';
              ctx.fillRect(0, 0, outputSize, outputSize);
            }

            // Fit image inside with padding
            const pad = Math.round(outputSize * paddingPct);
            const available = outputSize - pad * 2;
            const ratio = Math.min(available / img.width, available / img.height);
            const dw = Math.round(img.width * ratio);
            const dh = Math.round(img.height * ratio);
            const dx = Math.round((outputSize - dw) / 2);
            const dy = Math.round((outputSize - dh) / 2);
            ctx.drawImage(img, dx, dy, dw, dh);

     // Apply gamma correction via LUT (fast & no highlight blowout)
            const pixelData = ctx.getImageData(0, 0, outputSize, outputSize);
            const d = pixelData.data;
            for (let j = 0; j < d.length; j += 4) {
              // Skip fully transparent pixels
              if (d[j+3] === 0) continue;
              // Skip near-white background pixels (white padding)
              if (!useTransparent && d[j] > 248 && d[j+1] > 248 && d[j+2] > 248) continue;
              d[j]   = lut[d[j]];
              d[j+1] = lut[d[j+1]];
              d[j+2] = lut[d[j+2]];
            }
            ctx.putImageData(pixelData, 0, 0);
            resolve(out);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ─── Show results ─────────────────────────────────────────────
    function showResults() {
      const grid = document.getElementById('resultsGrid');
      processedCanvases.forEach(({ canvas, name }) => {
        const item = document.createElement('div');
        item.className = 'result-item';

        // Small preview canvas
        const preview = document.createElement('canvas');
        const ps = 160;
        preview.width = ps; preview.height = ps;
        const pctx = preview.getContext('2d');
        pctx.drawImage(canvas, 0, 0, ps, ps);
        item.appendChild(preview);

        const label = document.createElement('div');
        label.className = 'result-name';
        label.textContent = name;
        item.appendChild(label);

        grid.appendChild(item);
      });

      document.getElementById('resultCount').textContent = processedCanvases.length + '枚';
      document.getElementById('resultsSection').style.display = 'block';
      document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ─── Download ZIP ─────────────────────────────────────────────
    async function downloadAll() {
      const btn = document.querySelector('.btn-download');
      btn.textContent = '⏳ ZIPを作成中...';
      btn.disabled = true;

      const zip = new JSZip();
      const ext  = USE_TRANSPARENT ? 'png' : 'jpg';
      const mime = USE_TRANSPARENT ? 'image/png' : 'image/jpeg';

      for (const { canvas, name } of processedCanvases) {
        const baseName = name.replace(/\.[^.]+$/, '');
        const blob = await canvasToBlob(canvas, mime);
        zip.file(`${baseName}.${ext}`, blob);
      }

      const content = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'images.zip';
      a.click();
      URL.revokeObjectURL(url);

      btn.textContent = '📥 全てZIPでダウンロード';
      btn.disabled = false;
    }

    function canvasToBlob(canvas, mime) {
      return new Promise(resolve => {
        canvas.toBlob(resolve, mime, 0.92);
      });
    }

    // ─── Drag & drop helper ───────────────────────────────────────
    function setupDrop(dropId, inputId, callback) {
      const zone = document.getElementById(dropId);
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        callback(e.dataTransfer.files);
      });
    }
  </script>
</body>
</html>
